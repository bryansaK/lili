<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <title>Pour Alicia 💕</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }

    body {
      min-height: 100vh;
      background: #ffd6e7;
      background-image:
        radial-gradient(ellipse at 20% 10%, #ffe8f2 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, #ffcce0 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Ambient background hearts ── */
    .bg-hearts {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-hearts span {
      position: absolute; font-size: 16px; opacity: 0; bottom: -40px;
      animation: floatBg var(--dur) ease-in-out var(--del) infinite;
    }
    .bg-hearts span:nth-child(1) { left:  6%; --dur: 9s;  --del:  0s;  }
    .bg-hearts span:nth-child(2) { left: 20%; --dur: 12s; --del: -3s;  }
    .bg-hearts span:nth-child(3) { left: 38%; --dur: 8s;  --del: -1.5s;}
    .bg-hearts span:nth-child(4) { left: 58%; --dur: 11s; --del: -5s;  }
    .bg-hearts span:nth-child(5) { left: 76%; --dur: 7s;  --del: -2.5s;}
    .bg-hearts span:nth-child(6) { left: 90%; --dur: 13s; --del: -4s;  }
    @keyframes floatBg {
      0%   { transform: translateY(0) rotate(0deg);    opacity: 0;    }
      10%  {                                            opacity: 0.15; }
      90%  {                                            opacity: 0.15; }
      100% { transform: translateY(-115vh) rotate(360deg); opacity: 0; }
    }

    /* ── Scene ── */
    .scene { display: flex; flex-direction: column; align-items: center; gap: 0; position: relative; z-index: 1; }

    /* ── Strawberry wrap ── */
    #berry-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── Strawberry pair ── */
    .berry-pair {
      display: flex;
      gap: clamp(6px, 2vw, 16px);
      filter: drop-shadow(0 6px 18px rgba(200,50,100,0.22));
    }

    .berry {
      font-size: clamp(72px, 22vw, 110px);
      display: inline-block;
      transform-origin: bottom center;
      animation: berryIdle 2.4s ease-in-out infinite;
    }
    .berry:nth-child(2) { animation-delay: -1.2s; }

    @keyframes berryIdle {
      0%, 100% { transform: rotate(-7deg) scale(1);    }
      50%       { transform: rotate( 7deg) scale(1.06); }
    }

    /* ── Click bounce ── */
    @keyframes berryBounce {
      0%       { transform: translateY(0)     scale(1);    }
      20%      { transform: translateY(-28px) scale(0.88); }
      45%      { transform: translateY(-18px) scale(1.12); }
      65%      { transform: translateY(-6px)  scale(0.96); }
      80%      { transform: translateY(-10px) scale(1.04); }
      100%     { transform: translateY(0)     scale(1);    }
    }

    #berry-wrap.bouncing .berry {
      animation: berryBounce 0.55s cubic-bezier(.36,.07,.19,.97) 2;
    }
    #berry-wrap.bouncing .berry:nth-child(2) {
      animation-delay: 0.1s;
    }

    /* ── Message card ── */
    .berry-msg {
      font-family: 'Press Start 2P', monospace;
      color: #d44070;
      text-align: center;
      font-size: clamp(7px, 2.2vw, 11px);
      line-height: 2;
      margin-top: 20px;
      background: rgba(255,255,255,0.72);
      border: 2px solid #e87898;
      border-radius: 12px;
      padding: clamp(8px, 2vw, 14px) clamp(12px, 3vw, 22px);
      max-width: min(280px, 80vw);
      backdrop-filter: blur(4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .berry-msg.hidden {
      opacity: 0;
      pointer-events: none;
      position: absolute;
    }

    /* ── Floating hearts ── */
    @keyframes floatHeart {
      0%   { opacity: 1;   transform: translateY(0)      scale(0.4) rotate(var(--r)); }
      75%  { opacity: 0.9; }
      100% { opacity: 0;   transform: translateY(-180px) scale(1.5) rotate(var(--r)); }
    }
    .heart {
      position: fixed;
      font-size: clamp(22px, 6vw, 32px);
      pointer-events: none; z-index: 999;
      animation: floatHeart var(--d) ease-out forwards;
    }
  </style>
</head>
<body>

<div class="bg-hearts" aria-hidden="true">
  <span>💕</span><span>🩷</span><span>💗</span>
  <span>💕</span><span>💖</span><span>🩷</span>
</div>

<div class="scene">
  <div id="berry-wrap">
    <div class="berry-pair">
      <span class="berry">🍓</span>
      <span class="berry">🍓</span>
    </div>
    <div id="msg-before" class="berry-msg">clique-moi<br>dessus !</div>
    <div id="msg-after"  class="berry-msg hidden">je t'aime<br>(un peu)</div>
  </div>
</div>

<script>
const berryWrap = document.getElementById('berry-wrap');
const msgBefore = document.getElementById('msg-before');
const msgAfter  = document.getElementById('msg-after');
const EMOJIS    = ['🍓','💕','💗','🩷','💓','💖','❤️','💝'];
let   revealed  = false;

function spawnHearts() {
  const r  = berryWrap.getBoundingClientRect();
  const cx = r.left + r.width  * 0.5;
  const ty = r.top  + r.height * 0.15;
  for (let i = 0; i < 10; i++) {
    setTimeout(() => {
      const h = document.createElement('span');
      h.className   = 'heart';
      h.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      h.style.left  = (cx + (Math.random() - 0.5) * r.width * 1.6) + 'px';
      h.style.top   = ty + 'px';
      h.style.setProperty('--r', (Math.random() * 40 - 20) + 'deg');
      h.style.setProperty('--d', (0.9 + Math.random() * 0.9) + 's');
      document.body.appendChild(h);
      h.addEventListener('animationend', () => h.remove());
    }, i * 80);
  }
}

function onTap() {
  if (!revealed) {
    revealed = true;
    msgBefore.classList.add('hidden');
    msgAfter.classList.remove('hidden');
  }
  berryWrap.classList.remove('bouncing');
  void berryWrap.offsetWidth; // reflow to restart animation
  berryWrap.classList.add('bouncing');
  berryWrap.addEventListener('animationend', () => berryWrap.classList.remove('bouncing'), { once: true });
  spawnHearts();
}

berryWrap.addEventListener('click', onTap);
berryWrap.addEventListener('touchend', e => { e.preventDefault(); onTap(); }, { passive: false });
</script>
</body>
</html>
